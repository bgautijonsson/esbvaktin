services:
  db:
    image: pgvector/pgvector:pg17
    container_name: esbvaktin-db
    environment:
      POSTGRES_DB: esbvaktin
      POSTGRES_USER: esb
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - esbvaktin_data:/var/lib/postgresql/data

volumes:
  esbvaktin_data:
